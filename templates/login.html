<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – SportsKart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div class="sk-auth-wrap">
    <div class="sk-auth-box">
        <div class="sk-auth-logo"><i class="bi bi-trophy-fill"></i> SportsKart</div>
        <p class="sk-auth-sub">Gear Up. Play Hard.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}
                <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="sk-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text" style="background:rgba(255,255,255,0.05);border-color:#2a3a55;color:#8892a4"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control sk-form-control" placeholder="you@email.com" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="sk-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text" style="background:rgba(255,255,255,0.05);border-color:#2a3a55;color:#8892a4"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control sk-form-control" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-sk-primary w-100 py-2" style="font-size:1rem">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
        </form>

        <hr class="sk-divider my-3">
        <p class="text-center text-muted small mb-2">Don't have an account?</p>
        <a href="{{ url_for('register') }}" class="btn btn-sk-outline w-100">Create Account</a>

        <div class="mt-4 pt-3 border-top" style="border-color:#2a3a55!important">
            <p class="text-muted small text-center mb-2">Demo Credentials</p>
            <div class="d-flex gap-2">
                <div class="flex-1 text-center p-2 rounded" style="background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.2);flex:1">
                    <div style="color:#f5a623;font-size:0.7rem;font-weight:600">ADMIN</div>
                    <div style="font-size:0.7rem;color:#8892a4">admin@sportskart.com</div>
                    <div style="font-size:0.7rem;color:#8892a4">admin123</div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
