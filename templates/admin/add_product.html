{% extends 'admin/base.html' %}
{% block title %}Add Product{% endblock %}
{% block page_title %}Add Product{% endblock %}
{% block page_sub %}Add a new product to the catalogue{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-8">
        <div class="sk-card p-4">
            <form method="POST" enctype="multipart/form-data">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="sk-label">Product Name *</label>
                        <input type="text" name="name" class="form-control sk-form-control" placeholder="e.g. SG Master Cricket Bat" required>
                    </div>
                    <div class="col-md-6">
                        <label class="sk-label">Brand</label>
                        <input type="text" name="brand" class="form-control sk-form-control" placeholder="e.g. SG, Nike, Adidas">
                    </div>
                    <div class="col-md-6">
                        <label class="sk-label">Category *</label>
                        <select name="category_id" class="form-control sk-form-control" required>
                            <option value="">Select Category</option>
                            {% for c in categories %}
                            <option value="{{ c.id }}">{{ c.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="sk-label">Price (₹) *</label>
                        <input type="number" name="price" class="form-control sk-form-control" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                    <div class="col-md-6">
                        <label class="sk-label">Stock Quantity *</label>
                        <input type="number" name="stock" class="form-control sk-form-control" placeholder="0" min="0" required>
                    </div>
                    <div class="col-12">
                        <label class="sk-label">Description</label>
                        <textarea name="description" class="form-control sk-form-control" rows="4" placeholder="Product description..."></textarea>
                    </div>
                    <div class="col-12">
                        <label class="sk-label">Product Image</label>
                        <input type="file" name="image" class="form-control sk-form-control" accept="image/*" id="imgInput">
                        <div id="imgPreview" class="mt-2" style="display:none">
                            <img id="previewImg" style="max-height:150px;border-radius:8px;border:1px solid #2a3a55">
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-sk-primary px-4">
                        <i class="bi bi-plus-circle me-2"></i>Add Product
                    </button>
                    <a href="{{ url_for('admin_products') }}" class="btn btn-sk-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('imgInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById('previewImg').src = ev.target.result;
            document.getElementById('imgPreview').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
});
</script>
{% endblock %}
