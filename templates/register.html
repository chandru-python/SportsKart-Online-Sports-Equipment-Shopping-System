<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – SportsKart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div class="sk-auth-wrap">
    <div class="sk-auth-box" style="max-width:500px">
        <div class="sk-auth-logo"><i class="bi bi-trophy-fill"></i> SportsKart</div>
        <p class="sk-auth-sub">Create Your Account</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}
                <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="row g-3">
                <div class="col-12">
                    <label class="sk-label">Full Name</label>
                    <input type="text" name="name" class="form-control sk-form-control" placeholder="John Smith" required>
                </div>
                <div class="col-12">
                    <label class="sk-label">Email Address</label>
                    <input type="email" name="email" class="form-control sk-form-control" placeholder="you@email.com" required>
                </div>
                <div class="col-12">
                    <label class="sk-label">Phone Number</label>
                    <input type="tel" name="phone" class="form-control sk-form-control" placeholder="+91 98765 43210">
                </div>
                <div class="col-12">
                    <label class="sk-label">Delivery Address</label>
                    <textarea name="address" class="form-control sk-form-control" rows="2" placeholder="123, Sports Colony, City..."></textarea>
                </div>
                <div class="col-12">
                    <label class="sk-label">Password</label>
                    <input type="password" name="password" class="form-control sk-form-control" placeholder="Min. 6 characters" required minlength="6">
                </div>
            </div>
            <button type="submit" class="btn btn-sk-primary w-100 py-2 mt-4" style="font-size:1rem">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
        </form>

        <hr class="sk-divider my-3">
        <p class="text-center text-muted small mb-2">Already have an account?</p>
        <a href="{{ url_for('login') }}" class="btn btn-sk-outline w-100">Login</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
